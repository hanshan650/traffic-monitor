{% if congestion_top %}
<ul class="list-group list-group-flush">
    {% for road_id, count in congestion_top %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>{% if loop.index <= 3 %}
            {% if loop.index == 1 %}🥇{% elif loop.index == 2 %}🥈{% else %}🥉{% endif %}
        {% endif %}{{ road_id }}</span>
        <span class="badge bg-danger rounded-pill">{{ count|int }}</span>
    </li>
    {% endfor %}
</ul>
{% else %}
<p class="text-center text-muted py-3">暂无数据</p>
{% endif %}
