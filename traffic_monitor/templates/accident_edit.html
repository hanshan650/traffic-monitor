{% extends "base.html" %}
{% block title %}编辑事故{% endblock %}

{% block content %}
<div class="container">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('main.index') }}">首页</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('accident.accident_list') }}">事故管理</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('accident.accident_detail', accident_id=accident._id) }}">事故详情</a></li>
            <li class="breadcrumb-item active">编辑</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h4 class="mb-3"><i class="bi bi-pencil"></i> 编辑事故</h4>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">路段 <span class="text-danger">*</span></label>
                                <select class="form-select" name="road_id" required>
                                    {% for i in range(1, 13) %}
                                    <option value="R{{ '%03d'|format(i) }}" {% if accident.road_id == 'R%03d'|format(i) %}selected{% endif %}>
                                        R{{ '%03d'|format(i) }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">严重程度 <span class="text-danger">*</span></label>
                                <select class="form-select" name="severity" required>
                                    {% for val, label in [('minor','轻微'), ('moderate','一般'), ('severe','严重'), ('fatal','致命')] %}
                                    <option value="{{ val }}" {% if accident.severity == val %}selected{% endif %}>{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">天气状况</label>
                                <select class="form-select" name="weather">
                                    {% for val, label in [('sunny','晴天'), ('rain','雨天'), ('snow','雪天'), ('fog','雾天')] %}
                                    <option value="{{ val }}" {% if accident.weather == val %}selected{% endif %}>{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">路面状况</label>
                                <select class="form-select" name="road_condition">
                                    {% for val, label in [('dry','干燥'), ('wet','湿滑'), ('icy','结冰'), ('damaged','损坏')] %}
                                    <option value="{{ val }}" {% if accident.road_condition == val %}selected{% endif %}>{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">处理状态</label>
                                <select class="form-select" name="status">
                                    {% for val, label in [('reported','已上报'), ('processing','处理中'), ('resolved','已解决')] %}
                                    <option value="{{ val }}" {% if accident.status == val %}selected{% endif %}>{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">涉及车辆类型</label>
                            <div class="d-flex gap-3">
                                {% for val, label in [('car','小汽车'), ('bus','公交车'), ('truck','卡车'), ('motorcycle','摩托车')] %}
                                <label class="form-check">
                                    <input class="form-check-input" type="checkbox" name="vehicle_types" value="{{ val }}"
                                           {% if val in accident.vehicle_types %}checked{% endif %}> {{ label }}
                                </label>
                                {% endfor %}
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">事故描述 <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="description" rows="3" required>{{ accident.description }}</textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> 保存修改
                            </button>
                            <a href="{{ url_for('accident.accident_detail', accident_id=accident._id) }}" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
